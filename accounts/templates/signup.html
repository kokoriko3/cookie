{% extends "base.html" %}

{% block title %}会員登録{% endblock %}

{% block contents %}
<div class="container mt-5" style="max-width: 500px;">
    <h2>新規会員登録</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">登録する</button>
    </form>
    <p class="mt-3">すでにアカウントをお持ちの方は<a href="{% url 'accounts:login' %}">こちらからログイン</a></p>
</div>
{% endblock %}
