<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}チャットアプリ{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'chat:index' %}">💬 Djangoチャット</a>
            
            <div class="d-flex">
                <ul class="navbar-nav ms-auto flex-row align-items-center">
                    {% if user.is_authenticated %}
                        <li class="nav-item me-3 text-white">
                            {{ user.username }}さん
                        </li>
                        <li class="nav-item">
                            <form method="post" action="{% url 'accounts:logout' %}">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-outline-light btn-sm">ログアウト</button>
                            </form>
                        </li>
                    {% else %}
                        <li class="nav-item me-2">
                            <a class="btn btn-outline-light btn-sm" href="{% url 'accounts:login' %}">ログイン</a>
                        </li>
                        <li class="nav-item">
                            <a class="btn btn-primary btn-sm" href="{% url 'accounts:signup' %}">新規登録</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        {% block contents %}
        {% endblock %}
    </main>

</body>
</html>
